<!-- 1 機種を選択 -->
<div class="card">
    <div class="badge-title"><span class="badge">1</span> 機種を選択</div>
    <!-- id="machine-select" を追加し、onchange イベントを紐付けます -->
    <select id="machine-select" onchange="onMachineChange()">
        <option value="hokuto">スマスロ北斗の拳</option>
        <option value="ghoul">スマスロ東京喰種</option>
        <option value="karakuri2">Lパチスロ からくりサーカス2</option>
    </select>
</div>

<!-- 2 現在の状態を入力 -->
<div class="card">
    <div class="badge-title"><span class="badge">2</span> 現在の状態を入力</div>
    
    <div class="input-section">
        <label>内部状態</label>
        <!-- ここにJavaScriptで動的にボタンを生成します -->
        <div class="segment-control" id="state-buttons-container">
            <!-- 初期状態（北斗の拳） -->
            <button type="button" class="segment-btn active" onclick="selectState(this)">通常</button>
            <button type="button" class="segment-btn" onclick="selectState(this)">朝イチ(リセ)</button>
            <button type="button" class="segment-btn" onclick="selectState(this)">前回単発後</button>
        </div>
    </div>
    
    <!-- （省略：交換率や設定ベースは全機種共通なのでそのままでOKです） -->

    <div class="input-section">
        <label>現在の回転数 (G)</label>
        <div class="input-container">
            <!-- id="games-input" を追加します -->
            <input type="number" id="games-input" placeholder="350">
            <span class="unit">G</span>
        </div>
    </div>

    <button class="submit-btn" onclick="calculateEdge()">期待値を計算する</button>
</div>

<script>
// ★ 機種ごとの状態（ステータス）と、初期プレースホルダーの定義
const machineConfigs = {
    hokuto: {
        placeholder: "350",
        states: ["通常", "朝イチ(リセ)", "前回単発後"]
    },
    ghoul: {
        placeholder: "200",
        states: ["通常", "設定変更(リセ)", "CZスルー後"]
    },
    karakuri2: {
        placeholder: "400",
        states: ["通常", "設定変更(リセ)", "上位AT終了後"]
    }
};

// ★ 機種が切り替わったときに実行される関数
function onMachineChange() {
    const selectedMachine = document.getElementById("machine-select").value;
    const config = machineConfigs[selectedMachine];

    // 1. 回転数のプレースホルダーを切り替え
    document.getElementById("games-input").placeholder = config.placeholder;

    // 2. 内部状態のボタンを動的に書き換え
    const container = document.getElementById("state-buttons-container");
    container.innerHTML = ""; // 一旦中身を空にする

    config.states.forEach((stateName, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        // 最初のボタンだけアクティブ（白背景）にする
        btn.className = index === 0 ? "segment-btn active" : "segment-btn";
        btn.innerText = stateName;
        
        // クリックイベント（アクティブクラスの切り替え）を付与
        btn.onclick = function() {
            selectState(this);
        };
        
        container.appendChild(btn);
    });
}

// ★ 内部状態ボタンをクリックしたときに白背景（active）を切り替える関数
function selectState(clickedButton) {
    const buttons = clickedButton.parentElement.querySelectorAll(".segment-btn");
    buttons.forEach(btn => btn.classList.remove("active"));
    clickedButton.classList.add("active");
}
</script>
